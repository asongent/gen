# Source: keycloak/templates/configmap-env-vars.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-env-vars
  namespace: "keycloak"
  labels:
    app.kubernetes.io/instance: keycloak
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/version: 26.3.3
    helm.sh/chart: keycloak-25.2.0
    app.kubernetes.io/component: keycloak
    app.kubernetes.io/part-of: keycloak
data:
  BITNAMI_DEBUG: "false"
  KEYCLOAK_PRODUCTION: "true"
  KC_LOG_LEVEL: "INFO"
  KC_LOG_CONSOLE_OUTPUT: "default"
  # KC_BOOTSTRAP_ADMIN_USERNAME: ""
  KC_BOOTSTRAP_ADMIN_PASSWORD_FILE: /opt/bitnami/keycloak/secrets/password
  KC_HTTP_PORT: "8080"
  KC_HTTP_MANAGEMENT_PORT: "9000"
  KC_HTTP_ENABLED: "true"
  KC_PROXY_HEADERS: "xforwarded"
  KC_METRICS_ENABLED: "true"
  KC_DB_URL: "jdbc:postgresql://dbms.fredgentech.com:5432/usermanagement?currentSchema=public"
  KC_DB_SCHEMA: "public"
  KC_DB_PASSWORD_FILE: /opt/bitnami/keycloak/secrets/db-password
  KC_DB_USERNAME_FILE: /opt/bitnami/keycloak/secrets/db-username
  KC_HTTPS_PORT: "8443"
  KC_HTTPS_KEY_STORE_FILE: "/opt/bitnami/keycloak/certs/keycloak.keystore.jks"
  KC_HTTPS_TRUST_STORE_FILE: "/opt/bitnami/keycloak/certs/keycloak.truststore.jks"
  KC_CACHE: "ispn"
  KC_CACHE_STACK: "jdbc-ping"
  KC_CACHE_CONFIG_FILE: "cache-ispn.xml"
  JAVA_OPTS_APPEND: "-Djgroups.dns.query=keycloak-headless.keycloak.svc.cluster.local"
  KC_HTTP_RELATIVE_PATH: "/auth"
  KC_SPI_ADMIN_REALM: "master"
