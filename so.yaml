# Source: sonarqube/templates/prometheus-podmonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: sonarqube
  namespace: sonarqube
  labels:
    app: sonarqube
spec:
  namespaceSelector:
    matchNames:
    - sonarqube
  selector:
    matchLabels:
      app: sonarqube
  podMetricsEndpoints:
  - port: http
    path: /api/monitoring/metrics
    scheme: http
    interval: 30s
    bearerTokenSecret:
      name: monitoring-pass
      key: password
