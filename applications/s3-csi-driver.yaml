apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: s3-csi-driver
  namespace: argocd
spec:
  project: default
  source:
    repoURL:  https://github.com/asongent/gen.git
    targetRevision: HEAD
    path: s3-csi-driver
    helm:
      valueFiles:
      - values.yaml
  destination:
    namespace: s3csi-driver
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true